# PDP product query: first variant only, no variant selector in this exercise.
# @inContext localizes title/altText (published translations) and prices (Shopify Markets).
query ProductDetail($id: ID!, $language: LanguageCode!, $country: CountryCode!)
@inContext(language: $language, country: $country) {
    product(id: $id) {
        id
        title
        vendor
        # transform: the CDN downscales on the fly (original uploads are multi-MB) and,
        # with a width set, content-negotiates WebP/AVIF from the browser's Accept header.
        # width/height are the original dimensions: only the aspect ratio matters (CLS box).
        featuredImage {
            url(transform: { maxWidth: 800 })
            altText
            width
            height
        }
        variants(first: 1) {
            nodes {
                id
                availableForSale
                price {
                    amount
                    currencyCode
                }
                compareAtPrice {
                    amount
                    currencyCode
                }
            }
        }
    }
}
