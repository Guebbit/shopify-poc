openapi: 3.0.3
info:
    title: Shopify PDP + Cart Exercise API
    version: '3.0.0'
    description: |
        Minimal frontend-facing contract for the Shopify PDP + cart exercise.

        It mirrors the subset of the Shopify Storefront API domain the frontend
        needs: fetch one product for the PDP, create/read a cart, and add lines.
        Gift wrap and gift message are modeled as cart line attributes
        (gift_wrap = "true", gift_message = "<free text>") on the product line.

        The real implementation calls the Storefront GraphQL API directly; this
        document exists as the domain contract and codegen source (types, zod
        schemas).
    contact:
        name: API Team

servers:
    - url: http://localhost:3000
      description: Local

tags:
    - name: Products
      description: Product detail retrieval for the PDP.
    - name: Cart
      description: Cart creation, retrieval and line writes (Storefront cart mutations).

components:
    parameters:
        ProductIdPathParam:
            name: productId
            in: path
            required: true
            schema:
                $ref: '#/components/schemas/Id'
            description: Product identifier (Shopify GID)

        CartIdPathParam:
            name: cartId
            in: path
            required: true
            schema:
                $ref: '#/components/schemas/Id'
            description: Cart identifier (Shopify GID)

    responses:
        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        ValidationError:
            description: Validation failed
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'
        InternalError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/ErrorResponse'

    schemas:
        # ---------- Commons ----------
        Id:
            type: string
            description: Resource identifier (Shopify GID, e.g. gid://shopify/Product/123)

        Money:
            type: object
            required: [amount, currencyCode]
            properties:
                amount:
                    type: string
                    description: Decimal amount as string, as returned by the Storefront API
                    example: '19.90'
                currencyCode:
                    type: string
                    description: ISO 4217 currency code
                    example: EUR

        ErrorResponse:
            type: object
            required: [message]
            properties:
                message:
                    type: string
                    description: Technical error code or description
                errors:
                    type: array
                    items:
                        type: string
                    description: User-friendly error messages

        # ---------- Product (PDP) ----------
        ProductImage:
            type: object
            required: [url]
            properties:
                url:
                    type: string
                    format: uri
                altText:
                    type: string
                width:
                    type: integer
                    description: Intrinsic width in pixels, so the UI can reserve the image box before load (CLS).
                height:
                    type: integer
                    description: Intrinsic height in pixels, so the UI can reserve the image box before load (CLS).

        ProductVariant:
            type: object
            required: [id, availableForSale, price]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                availableForSale:
                    type: boolean
                price:
                    $ref: '#/components/schemas/Money'
                compareAtPrice:
                    $ref: '#/components/schemas/Money'

        Product:
            type: object
            description: Product detail for the PDP, with its default (first) variant.
            required: [id, title, vendor, variant]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                title:
                    type: string
                vendor:
                    type: string
                image:
                    $ref: '#/components/schemas/ProductImage'
                variant:
                    $ref: '#/components/schemas/ProductVariant'

        # ---------- Cart ----------
        CartLineAttribute:
            type: object
            description: |
                Key/value attribute attached to a cart line. Gift options use
                gift_wrap = "true" and gift_message = "<free text>".
            required: [key, value]
            properties:
                key:
                    type: string
                    example: gift_wrap
                value:
                    type: string
                    example: 'true'

        CartLine:
            type: object
            required: [id, quantity, title, vendor, lineTotal, attributes]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                quantity:
                    type: integer
                    minimum: 1
                title:
                    type: string
                    description: Product title of the line's merchandise
                vendor:
                    type: string
                image:
                    $ref: '#/components/schemas/ProductImage'
                lineTotal:
                    $ref: '#/components/schemas/Money'
                attributes:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartLineAttribute'

        Cart:
            type: object
            required: [id, totalQuantity, subtotal, lines]
            properties:
                id:
                    $ref: '#/components/schemas/Id'
                totalQuantity:
                    type: integer
                    minimum: 0
                subtotal:
                    $ref: '#/components/schemas/Money'
                lines:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartLine'

        # ---------- Requests ----------
        CartLineInput:
            type: object
            description: A variant to add to the cart, with optional gift attributes.
            required: [merchandiseId, quantity]
            properties:
                merchandiseId:
                    $ref: '#/components/schemas/Id'
                quantity:
                    type: integer
                    minimum: 1
                    default: 1
                attributes:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartLineAttribute'

        CreateCartRequest:
            type: object
            properties:
                lines:
                    type: array
                    items:
                        $ref: '#/components/schemas/CartLineInput'
                    description: Optional initial lines

        AddCartLinesRequest:
            type: object
            required: [lines]
            properties:
                lines:
                    type: array
                    minItems: 1
                    items:
                        $ref: '#/components/schemas/CartLineInput'

paths:
    /products/{productId}:
        get:
            operationId: getProduct
            tags: [Products]
            summary: Get product detail for the PDP
            description: Returns one product with its default variant, price and compare-at price.
            parameters:
                - $ref: '#/components/parameters/ProductIdPathParam'
            responses:
                '200':
                    description: Product detail
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Product'
                '404':
                    $ref: '#/components/responses/NotFound'
                '500':
                    $ref: '#/components/responses/InternalError'

    /cart:
        post:
            operationId: createCart
            tags: [Cart]
            summary: Create a cart (Storefront cartCreate)
            description: Creates a new cart, optionally with initial lines and gift attributes.
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateCartRequest'
            responses:
                '201':
                    description: Created cart
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Cart'
                '400':
                    $ref: '#/components/responses/ValidationError'
                '500':
                    $ref: '#/components/responses/InternalError'

    /cart/{cartId}:
        get:
            operationId: getCart
            tags: [Cart]
            summary: Get cart contents, including gift attributes
            description: Returns the cart with its lines, totals and gift wrap/message attributes.
            parameters:
                - $ref: '#/components/parameters/CartIdPathParam'
            responses:
                '200':
                    description: Cart contents
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Cart'
                '404':
                    $ref: '#/components/responses/NotFound'
                '500':
                    $ref: '#/components/responses/InternalError'

    /cart/{cartId}/lines:
        post:
            operationId: addCartLines
            tags: [Cart]
            summary: Add product variant lines to the cart (Storefront cartLinesAdd)
            description: Adds variant lines with quantity and optional gift_wrap/gift_message attributes.
            parameters:
                - $ref: '#/components/parameters/CartIdPathParam'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AddCartLinesRequest'
            responses:
                '200':
                    description: Updated cart
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Cart'
                '400':
                    $ref: '#/components/responses/ValidationError'
                '404':
                    $ref: '#/components/responses/NotFound'
                '500':
                    $ref: '#/components/responses/InternalError'
