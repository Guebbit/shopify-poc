# Frontend Docker Compose configuration
services:
    # Frontend app service (Nuxt dev server)
    app:
        build:
            context: .
            dockerfile: .docker/Dockerfile.dev
        restart: unless-stopped
        ports:
            - '${APP_PORT:-8080}:${APP_PORT:-8080}'
        environment:
            NODE_ENV: 'development'
            # Must match the published port above: nuxt.config.ts reads it for devServer.port
            APP_PORT: '${APP_PORT:-8080}'
        volumes:
            - .:/app:Z
            - /app/node_modules
        # --host 0.0.0.0: bind on all interfaces so the published port is reachable from the host
        command: ['npm', 'run', 'dev', '--', '--host', '0.0.0.0']

    # Production SSR server (Nitro): opt-in via `docker compose --profile production up app-prod`.
    # Shopify runtimeConfig comes from the host env / .env at RUNTIME, not baked into the image.
    app-prod:
        profiles: ['production']
        build:
            context: .
            dockerfile: .docker/Dockerfile.prod
        restart: unless-stopped
        ports:
            - '${APP_PORT:-8080}:8080'
        environment:
            NUXT_PUBLIC_SHOPIFY_ENDPOINT: '${NUXT_PUBLIC_SHOPIFY_ENDPOINT:-}'
            NUXT_PUBLIC_SHOPIFY_TOKEN: '${NUXT_PUBLIC_SHOPIFY_TOKEN:-}'
            NUXT_PUBLIC_SHOPIFY_PRODUCT_GID: '${NUXT_PUBLIC_SHOPIFY_PRODUCT_GID:-}'
