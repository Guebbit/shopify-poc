# Frontend Docker Compose configuration
services:
    # Frontend app service (Vue/Vite dev server)
    app:
        build:
            context: .
            dockerfile: .docker/Dockerfile
        restart: unless-stopped
        ports:
            - '${VITE_APP_PORT:-8080}:${VITE_APP_PORT:-8080}'
        environment:
            NODE_ENV: 'development'
            VITE_API_URL: '${VITE_API_URL:-http://localhost:3000}'
            VITE_API_WEBSOCKET: '${VITE_API_WEBSOCKET:-ws://localhost:3000/ws}'
            VITE_API_MOCK_ENABLED: '${VITE_API_MOCK_ENABLED:-true}'
        volumes:
            - .:/app:Z
            - /app/node_modules
        command: ['sh', '-c', 'npm run dev']
